name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  PNPM_VERSION: "10"
  # 24, pas 20 (EOL, voir l'avertissement de dépréciation GitHub Actions) : aligné sur la version
  # réellement utilisée en local depuis plusieurs phases — un écart de version Node entre CI (20)
  # et local (24) est une cause plausible du job "Lint, build, tests unitaires" resté rouge alors
  # qu'il passe toujours en local.
  NODE_VERSION: "24"

jobs:
  build-test:
    name: Lint, build, tests unitaires
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint (api, desktop, mobile, shared)
        run: pnpm -r run lint

      - name: Build packages/shared
        run: pnpm --filter @sih-saas/shared build

      - name: Build API
        run: pnpm --filter @sih-saas/api build

      - name: Tests unitaires API
        run: pnpm --filter @sih-saas/api test

      - name: Typecheck desktop (console plateforme + établissement)
        run: pnpm --filter @sih-saas/desktop typecheck

      - name: Typecheck mobile (patient)
        run: pnpm --filter @sih-saas/mobile typecheck

  integration-tests:
    name: Tests d'intégration (isolation RLS, Postgres + MongoDB réels)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Mêmes conteneurs qu'en local (Postgres+MongoDB+Redis, rôle applicatif sih_saas_app via
      # infrastructure/docker/postgres-init/01-create-app-role.sql) — --wait attend les healthchecks.
      - name: Démarrer les conteneurs de dev
        run: docker compose -f docker-compose.dev.yml up -d --wait

      # apps/api/.env.example correspond exactement aux ports/identifiants de docker-compose.dev.yml.
      - name: Configurer l'environnement
        run: cp apps/api/.env.example apps/api/.env

      - name: Build packages/shared
        run: pnpm --filter @sih-saas/shared build

      - name: Exécuter les migrations
        run: pnpm --filter @sih-saas/api migration:run

      - name: Tests d'intégration (isolation multi-tenant)
        run: pnpm --filter @sih-saas/api test:integration

      - name: Arrêter les conteneurs
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v

  e2e-tests:
    name: Tests E2E (Cypress, console établissement)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # `pnpm install` ne suffit pas : le runner est éphémère (rien dans ~/.cache/Cypress d'un
      # run à l'autre) et `install: false` ci-dessous désactive la vérification/téléchargement
      # intégrée de cypress-io/github-action — sans cette étape, le job échouait systématiquement
      # avec "the Cypress binary is missing", jamais à cause des specs elles-mêmes.
      - name: Installer le binaire Cypress
        run: pnpm --filter @sih-saas/desktop exec cypress install

      - name: Démarrer les conteneurs de dev
        run: docker compose -f docker-compose.dev.yml up -d --wait

      - name: Configurer l'environnement API
        run: cp apps/api/.env.example apps/api/.env

      - name: Build packages/shared
        run: pnpm --filter @sih-saas/shared build

      # Construit aussi dist/ (réutilisé par `start:prod` plus bas) — voir migration:run dans
      # apps/api/package.json, qui chaîne `pnpm build &&` avant la commande TypeORM elle-même.
      - name: Exécuter les migrations
        run: pnpm --filter @sih-saas/api migration:run

      # Idempotents (vérifient l'existant avant insertion) — forfaits (dont un avec le module
      # FACTURATION, nécessaire à paiement.cy.ts), matrice RBAC, premier compte super-admin
      # (testé par login.cy.ts).
      - name: Données de référence (forfaits, RBAC, super-admin)
        run: |
          pnpm --filter @sih-saas/api seed:plans
          pnpm --filter @sih-saas/api seed:rbac
          pnpm --filter @sih-saas/api seed:super-admin

      - name: Tests E2E (Cypress)
        uses: cypress-io/github-action@v6
        with:
          working-directory: apps/desktop
          install: false
          start: |
            pnpm --filter @sih-saas/api start:prod
            pnpm --filter @sih-saas/desktop dev
          wait-on: "http://localhost:3000/api/health, http://localhost:5173"
          wait-on-timeout: 60
        env:
          # Limites de débit auth assouplies UNIQUEMENT pour cet environnement CI éphémère (Phase
          # 26, voir auth.controller.ts) — défauts de production (3 et 5/min) inchangés ailleurs.
          AUTH_THROTTLE_REGISTER_LIMIT: "50"
          AUTH_THROTTLE_LOGIN_LIMIT: "50"

      - name: Arrêter les conteneurs
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v
