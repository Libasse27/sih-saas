# Déploiement production (Phase 11). Diffère volontairement de docker-compose.dev.yml :
# - aucun port DB exposé sur l'hôte (Postgres/Mongo/Redis joignables uniquement depuis le réseau
#   docker interne `sih_saas_net`, jamais depuis l'extérieur — prompt maître §17/§19).
# - secrets via env_file (apps/api/.env.production, jamais commité, voir .env.production.example).
# - volumes nommés persistants + healthchecks + redémarrage automatique.
services:
  postgres:
    image: postgres:16-alpine
    container_name: sih-saas-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_BOOTSTRAP_USER:-sih_saas}
      POSTGRES_PASSWORD: ${POSTGRES_BOOTSTRAP_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-sih_saas}
      # Lu par infrastructure/docker/postgres-init-prod/01-create-app-role.sh — jamais codé en dur
      # en production (contrairement à postgres-init/01-create-app-role.sql, utilisé en dev).
      SIH_SAAS_APP_PASSWORD: ${SIH_SAAS_APP_PASSWORD}
    volumes:
      - sih_saas_postgres_prod_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres-init-prod:/docker-entrypoint-initdb.d:ro
    networks:
      - sih_saas_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_BOOTSTRAP_USER:-sih_saas} -d ${POSTGRES_DB:-sih_saas}"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    container_name: sih-saas-mongodb-prod
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-sih_saas}
    volumes:
      - sih_saas_mongodb_prod_data:/data/db
    networks:
      - sih_saas_net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sih-saas-redis-prod
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - sih_saas_redis_prod_data:/data
    networks:
      - sih_saas_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: sih-saas-api:latest
    container_name: sih-saas-api-prod
    restart: unless-stopped
    env_file:
      - apps/api/.env.production
    ports:
      # Liée à 127.0.0.1 uniquement (debug/tunnel SSH) — le trafic public passe exclusivement par
      # nginx (80/443, TLS) ci-dessous, jamais directement sur ce port (prompt maître §17).
      - "127.0.0.1:${API_PORT:-3000}:3000"
    networks:
      - sih_saas_net
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # Sauvegarde quotidienne Postgres + MongoDB (Phase 22, voir docs/plan-de-reprise.md). Identifiants
  # bootstrap/root réutilisés directement (mêmes variables que les services postgres/mongodb
  # ci-dessus) — aucune nouvelle credential DB à gérer. Phase 31 : chiffrement at-rest (toujours
  # actif) + envoi hors-site (actif seulement si OFFSITE_BACKUP_ENABLED=true, voir
  # .env.production.example) — variables transmises telles quelles, jamais codées en dur.
  backup:
    build:
      context: ./infrastructure/docker/backup
    image: sih-saas-backup:latest
    container_name: sih-saas-backup-prod
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_BOOTSTRAP_USER:-sih_saas}
      POSTGRES_PASSWORD: ${POSTGRES_BOOTSTRAP_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-sih_saas}
      MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${MONGO_DB:-sih_saas}?authSource=admin
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      BACKUP_ENCRYPTION_PASSPHRASE: ${BACKUP_ENCRYPTION_PASSPHRASE}
      OFFSITE_BACKUP_ENABLED: ${OFFSITE_BACKUP_ENABLED:-false}
      OFFSITE_BACKUP_BUCKET: ${OFFSITE_BACKUP_BUCKET:-}
      RCLONE_CONFIG_OFFSITE_TYPE: ${RCLONE_CONFIG_OFFSITE_TYPE:-s3}
      RCLONE_CONFIG_OFFSITE_PROVIDER: ${RCLONE_CONFIG_OFFSITE_PROVIDER:-Other}
      RCLONE_CONFIG_OFFSITE_ACCESS_KEY_ID: ${RCLONE_CONFIG_OFFSITE_ACCESS_KEY_ID:-}
      RCLONE_CONFIG_OFFSITE_SECRET_ACCESS_KEY: ${RCLONE_CONFIG_OFFSITE_SECRET_ACCESS_KEY:-}
      RCLONE_CONFIG_OFFSITE_ENDPOINT: ${RCLONE_CONFIG_OFFSITE_ENDPOINT:-}
      RCLONE_CONFIG_OFFSITE_REGION: ${RCLONE_CONFIG_OFFSITE_REGION:-auto}
    volumes:
      - sih_saas_backups_data:/backups
    networks:
      - sih_saas_net
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  # Reverse-proxy TLS (Phase 32, gap §17 identifié à l'audit du 2026-06-21 : aucun chiffrement en
  # transit n'existait avant). Seul point d'entrée public (80/443) — l'API n'est plus joignable
  # depuis l'extérieur que via lui. Config rendue depuis infrastructure/docker/nginx/templates/ au
  # démarrage (envsubst natif de l'image nginx, voir le commentaire en tête du template).
  nginx:
    image: nginx:1.27-alpine
    container_name: sih-saas-nginx-prod
    restart: unless-stopped
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME}
    volumes:
      - ./infrastructure/docker/nginx/templates:/etc/nginx/templates:ro
      - sih_saas_certbot_conf:/etc/letsencrypt
      - sih_saas_certbot_www:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"
    networks:
      - sih_saas_net
    depends_on:
      api:
        condition: service_healthy

  # Renouvellement automatique du certificat Let's Encrypt (émission initiale = exécution manuelle
  # unique de infrastructure/docker/nginx/init-letsencrypt.sh, voir docs/tls-production.md).
  certbot:
    image: certbot/certbot:latest
    container_name: sih-saas-certbot-prod
    restart: unless-stopped
    volumes:
      - sih_saas_certbot_conf:/etc/letsencrypt
      - sih_saas_certbot_www:/var/www/certbot
    entrypoint: ["/bin/sh", "-c", "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $$!; done"]
    networks:
      - sih_saas_net

networks:
  sih_saas_net:
    driver: bridge

volumes:
  sih_saas_postgres_prod_data:
  sih_saas_mongodb_prod_data:
  sih_saas_redis_prod_data:
  sih_saas_backups_data:
  sih_saas_certbot_conf:
  sih_saas_certbot_www:
